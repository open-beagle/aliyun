name: Postgres-15

on:
  push:
    branches:
      - postgres-15

permissions:
  contents: read
  packages: write

env:
  BUILD_VERSION: "15.18"
  BUILD_MAJOR: "15"
  IMAGE_NAME_ALIYUN: registry.cn-qingdao.aliyuncs.com/wod/postgres
  IMAGE_NAME_GHCR: ghcr.io/open-beagle/postgres

jobs:
  postgres-debian:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.cn-qingdao.aliyuncs.com
          username: ${{ secrets.REGISTRY_USER_ALIYUN }}
          password: ${{ secrets.REGISTRY_PASSWORD_ALIYUN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push AMD64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./postgres/dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_NAME_ALIYUN }}:${{ env.BUILD_VERSION }}-amd64
            ${{ env.IMAGE_NAME_GHCR }}:${{ env.BUILD_VERSION }}-amd64
          build-args: |
            BASE=postgres:${{ env.BUILD_VERSION }}
            AUTHOR=${{ github.repository_owner }}
            VERSION=${{ env.BUILD_VERSION }}

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./postgres/dockerfile
          platforms: linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_NAME_ALIYUN }}:${{ env.BUILD_VERSION }}-arm64
            ${{ env.IMAGE_NAME_GHCR }}:${{ env.BUILD_VERSION }}-arm64
          build-args: |
            BASE=postgres:${{ env.BUILD_VERSION }}
            AUTHOR=${{ github.repository_owner }}
            VERSION=${{ env.BUILD_VERSION }}

      - name: Create and push Aliyun manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE_NAME_ALIYUN }}:${{ env.BUILD_VERSION }} \
            --tag ${{ env.IMAGE_NAME_ALIYUN }}:${{ env.BUILD_MAJOR }} \
            ${{ env.IMAGE_NAME_ALIYUN }}:${{ env.BUILD_VERSION }}-amd64 \
            ${{ env.IMAGE_NAME_ALIYUN }}:${{ env.BUILD_VERSION }}-arm64

      - name: Create and push GHCR manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE_NAME_GHCR }}:${{ env.BUILD_VERSION }} \
            --tag ${{ env.IMAGE_NAME_GHCR }}:${{ env.BUILD_MAJOR }} \
            ${{ env.IMAGE_NAME_GHCR }}:${{ env.BUILD_VERSION }}-amd64 \
            ${{ env.IMAGE_NAME_GHCR }}:${{ env.BUILD_VERSION }}-arm64

  postgres-alpine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.cn-qingdao.aliyuncs.com
          username: ${{ secrets.REGISTRY_USER_ALIYUN }}
          password: ${{ secrets.REGISTRY_PASSWORD_ALIYUN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push AMD64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./postgres/dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_NAME_ALIYUN }}:${{ env.BUILD_VERSION }}-alpine-amd64
            ${{ env.IMAGE_NAME_GHCR }}:${{ env.BUILD_VERSION }}-alpine-amd64
          build-args: |
            BASE=postgres:${{ env.BUILD_VERSION }}-alpine
            AUTHOR=${{ github.repository_owner }}
            VERSION=${{ env.BUILD_VERSION }}-alpine

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./postgres/dockerfile
          platforms: linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_NAME_ALIYUN }}:${{ env.BUILD_VERSION }}-alpine-arm64
            ${{ env.IMAGE_NAME_GHCR }}:${{ env.BUILD_VERSION }}-alpine-arm64
          build-args: |
            BASE=postgres:${{ env.BUILD_VERSION }}-alpine
            AUTHOR=${{ github.repository_owner }}
            VERSION=${{ env.BUILD_VERSION }}-alpine

      - name: Create and push Aliyun manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE_NAME_ALIYUN }}:${{ env.BUILD_VERSION }}-alpine \
            --tag ${{ env.IMAGE_NAME_ALIYUN }}:${{ env.BUILD_MAJOR }}-alpine \
            ${{ env.IMAGE_NAME_ALIYUN }}:${{ env.BUILD_VERSION }}-alpine-amd64 \
            ${{ env.IMAGE_NAME_ALIYUN }}:${{ env.BUILD_VERSION }}-alpine-arm64

      - name: Create and push GHCR manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE_NAME_GHCR }}:${{ env.BUILD_VERSION }}-alpine \
            --tag ${{ env.IMAGE_NAME_GHCR }}:${{ env.BUILD_MAJOR }}-alpine \
            ${{ env.IMAGE_NAME_GHCR }}:${{ env.BUILD_VERSION }}-alpine-amd64 \
            ${{ env.IMAGE_NAME_GHCR }}:${{ env.BUILD_VERSION }}-alpine-arm64
