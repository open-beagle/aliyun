name: clickhouse

on:
  push:
    branches:
      - clickhouse

env:
  BUILD_VERSION: 25.5.6

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        with:
          # 启用 buildx 缓存导出功能
          driver-opts: |
            image=moby/buildkit:master
            network=host

      # 设置缓存
      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v2
        with:
          registry: registry.cn-qingdao.aliyuncs.com
          username: ${{ secrets.REGISTRY_USER_ALIYUN }}
          password: ${{ secrets.REGISTRY_PASSWORD_ALIYUN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v5
        with:
          sbom: false
          context: .
          file: ./clickhouse/clickhouse-server.dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            registry.cn-qingdao.aliyuncs.com/wod/clickhouse:server-${{ env.BUILD_VERSION }}
            ghcr.io/${{ github.repository_owner }}/clickhouse:server-${{ env.BUILD_VERSION }}
          build-args: |
            BASE=clickhouse/clickhouse-server:${{ env.BUILD_VERSION }}
          # 使用缓存
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # 构建并推送 AMD64 架构镜像
      - name: Build and push AMD64 Docker image
        uses: docker/build-push-action@v5
        with:
          sbom: false
          context: .
          file: ./clickhouse/clickhouse-server.dockerfile
          push: true
          provenance: false
          tags: |
            registry.cn-qingdao.aliyuncs.com/wod/clickhouse:server-${{ env.BUILD_VERSION }}-amd64
            ghcr.io/${{ github.repository_owner }}/clickhouse:server-${{ env.BUILD_VERSION }}-amd64
          platforms: linux/amd64
          build-args: |
            BASE=clickhouse/clickhouse-server:${{ env.BUILD_VERSION }}
          # 使用缓存
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # 构建并推送 ARM64 架构镜像
      - name: Build and push ARM64 Docker image
        uses: docker/build-push-action@v5
        with:
          sbom: false
          context: .
          file: ./clickhouse/clickhouse-server.dockerfile
          push: true
          provenance: false
          tags: |
            registry.cn-qingdao.aliyuncs.com/wod/clickhouse:server-${{ env.BUILD_VERSION }}-arm64
            ghcr.io/${{ github.repository_owner }}/clickhouse:server-${{ env.BUILD_VERSION }}-arm64
          platforms: linux/arm64
          build-args: |
            BASE=clickhouse/clickhouse-server:${{ env.BUILD_VERSION }}
          # 使用缓存
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # 更新缓存
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Image build success
        run: echo "ClickHouse server:${{ env.BUILD_VERSION }} built and pushed successfully!"
