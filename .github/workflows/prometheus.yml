name: prometheus

on:
  push:
    branches:
      - prometheus

env:
  ALERTMANAGER_VERSION: v0.32.1
  NODE_EXPORTER_VERSION: v1.8.1
  KUBE_STATE_METRICS_VERSION: v2.14.0
  K8S_SIDECAR_VERSION: 2.7.3

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.cn-qingdao.aliyuncs.com
          username: ${{ secrets.REGISTRY_USER_ALIYUN }}
          password: ${{ secrets.REGISTRY_PASSWORD_ALIYUN }}

      # ==================== 1. Alertmanager ====================
      - name: Build and push Alertmanager AMD64
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./prometheus/alertmanager.dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: registry.cn-qingdao.aliyuncs.com/wod/prometheus:alertmanager-${{ env.ALERTMANAGER_VERSION }}-amd64
          build-args: BASE=quay.io/prometheus/alertmanager:${{ env.ALERTMANAGER_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Alertmanager ARM64
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./prometheus/alertmanager.dockerfile
          platforms: linux/arm64
          push: true
          provenance: false
          tags: registry.cn-qingdao.aliyuncs.com/wod/prometheus:alertmanager-${{ env.ALERTMANAGER_VERSION }}-arm64
          build-args: BASE=quay.io/prometheus/alertmanager:${{ env.ALERTMANAGER_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create and push Alertmanager manifest
        run: |
          docker buildx imagetools create \
            --tag registry.cn-qingdao.aliyuncs.com/wod/prometheus:alertmanager-${{ env.ALERTMANAGER_VERSION }} \
            registry.cn-qingdao.aliyuncs.com/wod/prometheus:alertmanager-${{ env.ALERTMANAGER_VERSION }}-amd64 \
            registry.cn-qingdao.aliyuncs.com/wod/prometheus:alertmanager-${{ env.ALERTMANAGER_VERSION }}-arm64

      # ==================== 2. Node Exporter ====================
      - name: Build and push Node Exporter AMD64
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./prometheus/node-exporter.dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: registry.cn-qingdao.aliyuncs.com/wod/prometheus:node-exporter-${{ env.NODE_EXPORTER_VERSION }}-amd64
          build-args: BASE=quay.io/prometheus/node-exporter:${{ env.NODE_EXPORTER_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Node Exporter ARM64
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./prometheus/node-exporter.dockerfile
          platforms: linux/arm64
          push: true
          provenance: false
          tags: registry.cn-qingdao.aliyuncs.com/wod/prometheus:node-exporter-${{ env.NODE_EXPORTER_VERSION }}-arm64
          build-args: BASE=quay.io/prometheus/node-exporter:${{ env.NODE_EXPORTER_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create and push Node Exporter manifest
        run: |
          docker buildx imagetools create \
            --tag registry.cn-qingdao.aliyuncs.com/wod/prometheus:node-exporter-${{ env.NODE_EXPORTER_VERSION }} \
            registry.cn-qingdao.aliyuncs.com/wod/prometheus:node-exporter-${{ env.NODE_EXPORTER_VERSION }}-amd64 \
            registry.cn-qingdao.aliyuncs.com/wod/prometheus:node-exporter-${{ env.NODE_EXPORTER_VERSION }}-arm64

      # ==================== 3. Kube State Metrics ====================
      - name: Build and push Kube State Metrics AMD64
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./prometheus/kube-state-metrics.dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: registry.cn-qingdao.aliyuncs.com/wod/prometheus:kube-state-metrics-${{ env.KUBE_STATE_METRICS_VERSION }}-amd64
          build-args: BASE=registry.k8s.io/kube-state-metrics/kube-state-metrics:${{ env.KUBE_STATE_METRICS_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Kube State Metrics ARM64
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./prometheus/kube-state-metrics.dockerfile
          platforms: linux/arm64
          push: true
          provenance: false
          tags: registry.cn-qingdao.aliyuncs.com/wod/prometheus:kube-state-metrics-${{ env.KUBE_STATE_METRICS_VERSION }}-arm64
          build-args: BASE=registry.k8s.io/kube-state-metrics/kube-state-metrics:${{ env.KUBE_STATE_METRICS_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create and push Kube State Metrics manifest
        run: |
          docker buildx imagetools create \
            --tag registry.cn-qingdao.aliyuncs.com/wod/prometheus:kube-state-metrics-${{ env.KUBE_STATE_METRICS_VERSION }} \
            registry.cn-qingdao.aliyuncs.com/wod/prometheus:kube-state-metrics-${{ env.KUBE_STATE_METRICS_VERSION }}-amd64 \
            registry.cn-qingdao.aliyuncs.com/wod/prometheus:kube-state-metrics-${{ env.KUBE_STATE_METRICS_VERSION }}-arm64

      # ==================== 4. k8s-sidecar ====================
      - name: Build and push k8s-sidecar AMD64
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./prometheus/k8s-sidecar.dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: registry.cn-qingdao.aliyuncs.com/wod/prometheus:k8s-sidecar-${{ env.K8S_SIDECAR_VERSION }}-amd64
          build-args: BASE=kiwigrid/k8s-sidecar:${{ env.K8S_SIDECAR_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push k8s-sidecar ARM64
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./prometheus/k8s-sidecar.dockerfile
          platforms: linux/arm64
          push: true
          provenance: false
          tags: registry.cn-qingdao.aliyuncs.com/wod/prometheus:k8s-sidecar-${{ env.K8S_SIDECAR_VERSION }}-arm64
          build-args: BASE=kiwigrid/k8s-sidecar:${{ env.K8S_SIDECAR_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create and push k8s-sidecar manifest
        run: |
          docker buildx imagetools create \
            --tag registry.cn-qingdao.aliyuncs.com/wod/prometheus:k8s-sidecar-${{ env.K8S_SIDECAR_VERSION }} \
            registry.cn-qingdao.aliyuncs.com/wod/prometheus:k8s-sidecar-${{ env.K8S_SIDECAR_VERSION }}-amd64 \
            registry.cn-qingdao.aliyuncs.com/wod/prometheus:k8s-sidecar-${{ env.K8S_SIDECAR_VERSION }}-arm64

      - name: Pipeline Completed
        run: echo "All Prometheus suite multi-arch images successfully built and pushed!"
