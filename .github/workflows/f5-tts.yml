name: f5-tts

on:
  push:
    branches:
      - f5-tts
  workflow_dispatch:

env:
  UPSTREAM_IMAGE: "ghcr.io/swivid/f5-tts:main"
  BUILD_VERSION: "f5-main"

# F5-TTS - Fairytaler that Fakes Fluent and Faithful Speech with Flow Matching
# Docker image: ghcr.io/swivid/f5-tts:main
# - CUDA / PyTorch GPU-accelerated TTS
# - Gradio web UI on port 7860
# - Model weights downloaded from Hugging Face on first run

jobs:
  pull-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v2
        with:
          registry: registry.cn-qingdao.aliyuncs.com
          username: ${{ secrets.REGISTRY_USER_ALIYUN }}
          password: ${{ secrets.REGISTRY_PASSWORD_ALIYUN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull official image
        run: docker pull ${{ env.UPSTREAM_IMAGE }}

      - name: Tag and push to Aliyun
        run: |
          docker tag ${{ env.UPSTREAM_IMAGE }} registry.cn-qingdao.aliyuncs.com/wod/tts:${{ env.BUILD_VERSION }}
          docker push registry.cn-qingdao.aliyuncs.com/wod/tts:${{ env.BUILD_VERSION }}

      - name: Image sync success
        run: echo "tts:${{ env.BUILD_VERSION }} synced successfully!"
