name: f5-tts

on:
  push:
    branches:
      - f5-tts
  workflow_dispatch:

env:
  F5_TTS_VERSION: "1.1.20"
  IMAGE_NAME: registry.cn-qingdao.aliyuncs.com/wod/verdantflare-app

# F5-TTS - Fairytaler that Fakes Fluent and Faithful Speech with Flow Matching
# Custom build with pinned torch ecosystem versions for ABI compatibility
# - CUDA / PyTorch GPU-accelerated TTS
# - Gradio web UI on port 7860
# - Model weights downloaded from Hugging Face on first run

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read

    steps:
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo docker image prune --all --force

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.cn-qingdao.aliyuncs.com
          username: ${{ secrets.REGISTRY_USER_ALIYUN }}
          password: ${{ secrets.REGISTRY_PASSWORD_ALIYUN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          sbom: false
          context: ./f5-tts
          file: ./f5-tts/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_NAME }}:f5-tts-${{ env.F5_TTS_VERSION }}
          build-args: |
            F5_TTS_VERSION=${{ env.F5_TTS_VERSION }}

      - name: Image build success
        run: echo "verdantflare-app:f5-tts-${{ env.F5_TTS_VERSION }} built and pushed successfully!"
