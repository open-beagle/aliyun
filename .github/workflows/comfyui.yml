name: comfyui

on:
  push:
    branches:
      - comfyui

jobs:
  pull-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v2
        with:
          registry: registry.cn-qingdao.aliyuncs.com
          username: ${{ secrets.REGISTRY_USER_ALIYUN }}
          password: ${{ secrets.REGISTRY_PASSWORD_ALIYUN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull official image
        run: docker pull ghcr.io/ai-dock/comfyui:latest-cuda

      - name: Tag and push to Aliyun
        run: |
          docker tag ghcr.io/ai-dock/comfyui:latest-cuda registry.cn-qingdao.aliyuncs.com/wod/comfyui:latest
          docker push registry.cn-qingdao.aliyuncs.com/wod/comfyui:latest

      - name: Image sync success
        run: echo "comfyui:latest synced successfully!"
