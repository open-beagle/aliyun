name: xray

on:
  push:
    branches:
      - xray

env:
  BUILD_VERSION: 25.7.26
  TARGET_REGISTRY: registry.cn-qingdao.aliyuncs.com/wod/xray

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v2
        with:
          registry: registry.cn-qingdao.aliyuncs.com
          username: ${{ secrets.REGISTRY_USER_ALIYUN }}
          password: ${{ secrets.REGISTRY_PASSWORD_ALIYUN }}

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./xray/dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ env.TARGET_REGISTRY }}:v${{ env.BUILD_VERSION }}
          build-args: |
            BASE=ghcr.io/xtls/xray-core:${{ env.BUILD_VERSION }}
            VERSION=${{ env.BUILD_VERSION }}

      - name: Image sync success
        run: echo "xray image synced successfully!"
