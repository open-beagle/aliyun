name: jasna

on:
  push:
    branches:
      - jasna
  workflow_dispatch:

env:
  BUILD_VERSION: "13.0.3"
  JASNA_VERSION: "v0.6.0-alpha5"
  IMAGE_NAME: registry.cn-qingdao.aliyuncs.com/wod/cuda

jobs:
  jasna:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo docker image prune --all --force

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.cn-qingdao.aliyuncs.com
          username: ${{ secrets.REGISTRY_USER_ALIYUN }}
          password: ${{ secrets.REGISTRY_PASSWORD_ALIYUN }}

      - name: Build Jasna standalone binary via Builder Image
        uses: docker/build-push-action@v5
        with:
          context: ./jasna
          file: ./jasna/dockerfile.build
          platforms: linux/amd64
          load: true
          push: false
          tags: jasna-builder:latest
          build-args: |
            BUILDER_BASE=nvidia/cuda:${{ env.BUILD_VERSION }}-devel-ubuntu24.04
            JASNA_VERSION=${{ env.JASNA_VERSION }}

      - name: Extract compiled Jasna binary
        run: |
          docker create --name extract_jasna jasna-builder:latest
          docker cp extract_jasna:/app/jasna/dist_linux/jasna ./jasna/dist_jasna
          docker rm extract_jasna

      - name: Build and push jasna runtime image
        uses: docker/build-push-action@v5
        with:
          context: ./jasna
          file: ./jasna/dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.BUILD_VERSION }}-jasna-${{ env.JASNA_VERSION }}
          build-args: |
            BASE=nvidia/cuda:${{ env.BUILD_VERSION }}-runtime-ubuntu24.04
            AUTHOR=${{ github.repository_owner }}
            VERSION=${{ env.BUILD_VERSION }}

      - name: Build complete
        run: echo "CUDA ${{ env.BUILD_VERSION }}-jasna-${{ env.JASNA_VERSION }} pushed successfully!"
