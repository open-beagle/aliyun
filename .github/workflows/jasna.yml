name: jasna

on:
  push:
    branches:
      - jasna
  workflow_dispatch:

env:
  BUILD_VERSION: "12.8.1"
  IMAGE_NAME: registry.cn-qingdao.aliyuncs.com/wod/cuda

jobs:
  jasna:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.cn-qingdao.aliyuncs.com
          username: ${{ secrets.REGISTRY_USER_ALIYUN }}
          password: ${{ secrets.REGISTRY_PASSWORD_ALIYUN }}

      - name: Build and push jasna image
        uses: docker/build-push-action@v5
        with:
          context: ./jasna
          file: ./jasna/dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.BUILD_VERSION }}-jasna
          build-args: |
            BASE=${{ env.IMAGE_NAME }}:${{ env.BUILD_VERSION }}-devel-ubuntu24.04
            AUTHOR=${{ github.repository_owner }}
            VERSION=${{ env.BUILD_VERSION }}

      - name: Build complete
        run: echo "CUDA ${{ env.BUILD_VERSION }}-jasna pushed successfully!"
