name: facefusion

on:
  push:
    branches:
      - facefusion

env:
  FACEFUSION_VERSION: "3.7.1"
  BASE_IMAGE: "nvidia/cuda:12.9.1-cudnn-runtime-ubuntu24.04"
  IMAGE_NAME: registry.cn-qingdao.aliyuncs.com/wod/verdantflare-app

# FaceFusion - GPU accelerated face manipulation platform
# Custom build based on the official CUDA Dockerfile:
# https://github.com/facefusion/facefusion-docker/blob/master/Dockerfile.cuda
# - CUDA / ONNX Runtime GPU execution
# - Gradio web UI on port 7860
# - Model assets downloaded on first run and persisted under /facefusion/.assets

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read

    steps:
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo docker image prune --all --force

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.cn-qingdao.aliyuncs.com
          username: ${{ secrets.REGISTRY_USER_ALIYUN }}
          password: ${{ secrets.REGISTRY_PASSWORD_ALIYUN }}

      - name: Check CUDA base image
        run: docker manifest inspect ${{ env.BASE_IMAGE }} >/dev/null

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./facefusion
          file: ./facefusion/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_NAME }}:facefusion-${{ env.FACEFUSION_VERSION }}
          build-args: |
            BASE=${{ env.BASE_IMAGE }}
            FACEFUSION_VERSION=${{ env.FACEFUSION_VERSION }}

      - name: Image build success
        run: echo "verdantflare-app:facefusion-${{ env.FACEFUSION_VERSION }} built and pushed successfully!"
