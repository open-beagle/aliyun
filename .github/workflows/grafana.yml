name: grafana

on:
  push:
    branches:
      - grafana

env:
  GRAFANA_VERSION: 11.6.14

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.cn-qingdao.aliyuncs.com
          username: ${{ secrets.REGISTRY_USER_ALIYUN }}
          password: ${{ secrets.REGISTRY_PASSWORD_ALIYUN }}

      - name: Build and push Grafana AMD64
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./grafana/grafana.dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: registry.cn-qingdao.aliyuncs.com/wod/grafana:${{ env.GRAFANA_VERSION }}-amd64
          build-args: BASE=grafana/grafana:${{ env.GRAFANA_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Grafana ARM64
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./grafana/grafana.dockerfile
          platforms: linux/arm64
          push: true
          provenance: false
          tags: registry.cn-qingdao.aliyuncs.com/wod/grafana:${{ env.GRAFANA_VERSION }}-arm64
          build-args: BASE=grafana/grafana:${{ env.GRAFANA_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create and push Grafana manifest
        run: |
          docker buildx imagetools create \
            --tag registry.cn-qingdao.aliyuncs.com/wod/grafana:${{ env.GRAFANA_VERSION }} \
            registry.cn-qingdao.aliyuncs.com/wod/grafana:${{ env.GRAFANA_VERSION }}-amd64 \
            registry.cn-qingdao.aliyuncs.com/wod/grafana:${{ env.GRAFANA_VERSION }}-arm64

      - name: Pipeline Completed
        run: echo "Grafana multi-arch image successfully built and pushed!"
