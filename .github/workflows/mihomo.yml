name: mihomo

on:
  push:
    branches:
      - mihomo

env:
  BUILD_VERSION: v1.19.22
  TARGET_REGISTRY: registry.cn-qingdao.aliyuncs.com/wod/mihomo

jobs:
  sync-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v2
        with:
          registry: registry.cn-qingdao.aliyuncs.com
          username: ${{ secrets.REGISTRY_USER_ALIYUN }}
          password: ${{ secrets.REGISTRY_PASSWORD_ALIYUN }}

      - name: Build and push mihomo
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./mihomo/dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ env.TARGET_REGISTRY }}:${{ env.BUILD_VERSION }}
          build-args: |
            BASE=metacubex/mihomo:${{ env.BUILD_VERSION }}

      - name: Image sync success
        run: echo "mihomo image synced successfully!"
