name: golang-1.20

on:
  push:
    branches:
      - golang-1.20
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  BUILD_VERSION: 1.20.14
  XX_VERSION: 1.9.0
  IMAGE_NAME_ALIYUN: registry.cn-qingdao.aliyuncs.com/wod/golang
  IMAGE_NAME_GHCR: ghcr.io/open-beagle/golang
  GOPROXY_ALIYUN: https://goproxy.cn
  GOPROXY_GHCR: https://proxy.golang.org,direct

jobs:
  golang-alpine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Calculate release version
        id: version
        run: |
          RELEASE_VERSION=$(echo "${{ env.BUILD_VERSION }}" | cut -d. -f1,2)
          echo "release=$RELEASE_VERSION" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # 启用 buildx 缓存导出功能
          driver-opts: |
            image=moby/buildkit:master
            network=host

      # 设置缓存
      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 构建多架构镜像
      - name: Build and push GHCR multi-platform Docker images
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./golang/alpine.dockerfile
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_NAME_GHCR }}:${{ env.BUILD_VERSION }}-alpine
            ${{ env.IMAGE_NAME_GHCR }}:${{ steps.version.outputs.release }}-alpine
          platforms: linux/amd64,linux/arm64
          build-args: |
            XXBASE=tonistiigi/xx:${{ env.XX_VERSION }}
            BASE=golang:${{ env.BUILD_VERSION }}-alpine
            GOPROXY=${{ env.GOPROXY_GHCR }}
            AUTHOR=${{ github.repository_owner }}
            VERSION=${{ env.BUILD_VERSION }}
          # 使用缓存
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # 构建并推送 AMD64 架构镜像
      - name: Build and push GHCR AMD64 Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./golang/alpine.dockerfile
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_NAME_GHCR }}:${{ env.BUILD_VERSION }}-alpine-amd64
          platforms: linux/amd64
          build-args: |
            XXBASE=tonistiigi/xx:${{ env.XX_VERSION }}
            BASE=golang:${{ env.BUILD_VERSION }}-alpine
            GOPROXY=${{ env.GOPROXY_GHCR }}
            AUTHOR=${{ github.repository_owner }}
            VERSION=${{ env.BUILD_VERSION }}
          # 使用缓存
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # 构建并推送 ARM64 架构镜像
      - name: Build and push GHCR ARM64 Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./golang/alpine.dockerfile
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_NAME_GHCR }}:${{ env.BUILD_VERSION }}-alpine-arm64
          platforms: linux/arm64
          build-args: |
            XXBASE=tonistiigi/xx:${{ env.XX_VERSION }}
            BASE=golang:${{ env.BUILD_VERSION }}-alpine
            GOPROXY=${{ env.GOPROXY_GHCR }}
            AUTHOR=${{ github.repository_owner }}
            VERSION=${{ env.BUILD_VERSION }}
          # 使用缓存
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.cn-qingdao.aliyuncs.com
          username: ${{ secrets.REGISTRY_USER_ALIYUN }}
          password: ${{ secrets.REGISTRY_PASSWORD_ALIYUN }}

      # 构建多架构镜像
      - name: Build and push Aliyun multi-platform Docker images
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./golang/alpine.dockerfile
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_NAME_ALIYUN }}:${{ env.BUILD_VERSION }}-alpine
            ${{ env.IMAGE_NAME_ALIYUN }}:${{ steps.version.outputs.release }}-alpine
          platforms: linux/amd64,linux/arm64
          build-args: |
            XXBASE=tonistiigi/xx:${{ env.XX_VERSION }}
            BASE=golang:${{ env.BUILD_VERSION }}-alpine
            GOPROXY=${{ env.GOPROXY_ALIYUN }}
            AUTHOR=${{ github.repository_owner }}
            VERSION=${{ env.BUILD_VERSION }}
          # 使用缓存
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # 构建并推送 AMD64 架构镜像
      - name: Build and push Aliyun AMD64 Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./golang/alpine.dockerfile
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_NAME_ALIYUN }}:${{ env.BUILD_VERSION }}-alpine-amd64
          platforms: linux/amd64
          build-args: |
            XXBASE=tonistiigi/xx:${{ env.XX_VERSION }}
            BASE=golang:${{ env.BUILD_VERSION }}-alpine
            GOPROXY=${{ env.GOPROXY_ALIYUN }}
            AUTHOR=${{ github.repository_owner }}
            VERSION=${{ env.BUILD_VERSION }}
          # 使用缓存
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # 构建并推送 ARM64 架构镜像
      - name: Build and push Aliyun ARM64 Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./golang/alpine.dockerfile
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_NAME_ALIYUN }}:${{ env.BUILD_VERSION }}-alpine-arm64
          platforms: linux/arm64
          build-args: |
            XXBASE=tonistiigi/xx:${{ env.XX_VERSION }}
            BASE=golang:${{ env.BUILD_VERSION }}-alpine
            GOPROXY=${{ env.GOPROXY_ALIYUN }}
            AUTHOR=${{ github.repository_owner }}
            VERSION=${{ env.BUILD_VERSION }}
          # 使用缓存
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # 更新缓存
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Image push success
        run: echo "Alpine Docker images and manifests pushed successfully to Aliyun and GHCR"

  golang-bullseye:
    runs-on: ubuntu-latest
    needs: golang-alpine

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Calculate release version
        id: version
        run: |
          RELEASE_VERSION=$(echo "${{ env.BUILD_VERSION }}" | cut -d. -f1,2)
          echo "release=$RELEASE_VERSION" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # 启用 buildx 缓存导出功能
          driver-opts: |
            image=moby/buildkit:master
            network=host

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 构建并推送 AMD64 架构镜像
      - name: Build and push GHCR AMD64 Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./golang/bullseye.dockerfile
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_NAME_GHCR }}:${{ env.BUILD_VERSION }}-bullseye-amd64
            ${{ env.IMAGE_NAME_GHCR }}:${{ env.BUILD_VERSION }}-bullseye
            ${{ env.IMAGE_NAME_GHCR }}:${{ env.BUILD_VERSION }}
            ${{ env.IMAGE_NAME_GHCR }}:${{ steps.version.outputs.release }}-bullseye
            ${{ env.IMAGE_NAME_GHCR }}:${{ steps.version.outputs.release }}
          platforms: linux/amd64
          build-args: |
            XXBASE=tonistiigi/xx:${{ env.XX_VERSION }}
            BASE=golang:${{ env.BUILD_VERSION }}-bullseye
            GOPROXY=${{ env.GOPROXY_GHCR }}
            AUTHOR=${{ github.repository_owner }}
            VERSION=${{ env.BUILD_VERSION }}

      # 构建并推送 ARM64 架构镜像
      - name: Build and push GHCR ARM64 Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./golang/bullseye-arch.dockerfile
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_NAME_GHCR }}:${{ env.BUILD_VERSION }}-bullseye-arm64
          platforms: linux/arm64
          build-args: |
            XXBASE=tonistiigi/xx:${{ env.XX_VERSION }}
            BASE=golang:${{ env.BUILD_VERSION }}-bullseye
            GOPROXY=${{ env.GOPROXY_GHCR }}
            AUTHOR=${{ github.repository_owner }}
            VERSION=${{ env.BUILD_VERSION }}

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.cn-qingdao.aliyuncs.com
          username: ${{ secrets.REGISTRY_USER_ALIYUN }}
          password: ${{ secrets.REGISTRY_PASSWORD_ALIYUN }}

      # 构建并推送 AMD64 架构镜像
      - name: Build and push Aliyun AMD64 Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./golang/bullseye.dockerfile
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_NAME_ALIYUN }}:${{ env.BUILD_VERSION }}-bullseye-amd64
            ${{ env.IMAGE_NAME_ALIYUN }}:${{ env.BUILD_VERSION }}-bullseye
            ${{ env.IMAGE_NAME_ALIYUN }}:${{ env.BUILD_VERSION }}
            ${{ env.IMAGE_NAME_ALIYUN }}:${{ steps.version.outputs.release }}-bullseye
            ${{ env.IMAGE_NAME_ALIYUN }}:${{ steps.version.outputs.release }}
          platforms: linux/amd64
          build-args: |
            XXBASE=tonistiigi/xx:${{ env.XX_VERSION }}
            BASE=golang:${{ env.BUILD_VERSION }}-bullseye
            GOPROXY=${{ env.GOPROXY_ALIYUN }}
            AUTHOR=${{ github.repository_owner }}
            VERSION=${{ env.BUILD_VERSION }}

      # 构建并推送 ARM64 架构镜像
      - name: Build and push Aliyun ARM64 Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./golang/bullseye-arch.dockerfile
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_NAME_ALIYUN }}:${{ env.BUILD_VERSION }}-bullseye-arm64
          platforms: linux/arm64
          build-args: |
            XXBASE=tonistiigi/xx:${{ env.XX_VERSION }}
            BASE=golang:${{ env.BUILD_VERSION }}-bullseye
            GOPROXY=${{ env.GOPROXY_ALIYUN }}
            AUTHOR=${{ github.repository_owner }}
            VERSION=${{ env.BUILD_VERSION }}

      - name: Image push success
        run: echo "Bullseye Docker images and manifests pushed successfully to Aliyun and GHCR"
