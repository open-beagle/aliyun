name: generic-device-plugin

on:
  push:
    branches:
      - generic-device-plugin
  workflow_dispatch:

env:
  BUILD_VERSION: 0.2.0
  TARGET_REGISTRY: registry.cn-qingdao.aliyuncs.com/wod/generic-device-plugin

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.cn-qingdao.aliyuncs.com
          username: ${{ secrets.REGISTRY_USER_ALIYUN }}
          password: ${{ secrets.REGISTRY_PASSWORD_ALIYUN }}

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./generic-device-plugin/dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ env.TARGET_REGISTRY }}:${{ env.BUILD_VERSION }}
          build-args: |
            BASE=squat/generic-device-plugin:${{ env.BUILD_VERSION }}
            VERSION=${{ env.BUILD_VERSION }}

      - name: Build and push AMD64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./generic-device-plugin/dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ env.TARGET_REGISTRY }}:${{ env.BUILD_VERSION }}-amd64
          build-args: |
            BASE=squat/generic-device-plugin:${{ env.BUILD_VERSION }}
            VERSION=${{ env.BUILD_VERSION }}

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./generic-device-plugin/dockerfile
          platforms: linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ env.TARGET_REGISTRY }}:${{ env.BUILD_VERSION }}-arm64
          build-args: |
            BASE=squat/generic-device-plugin:${{ env.BUILD_VERSION }}
            VERSION=${{ env.BUILD_VERSION }}

      - name: Image sync success
        run: echo "generic-device-plugin image synced successfully!"
