name: victoriametrics

on:
  push:
    branches:
      - victoriametrics

env:
  BUILD_VERSION: v1.101.0

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.cn-qingdao.aliyuncs.com
          username: ${{ secrets.REGISTRY_USER_ALIYUN }}
          password: ${{ secrets.REGISTRY_PASSWORD_ALIYUN }}

      # ==================== 1. vmagent ====================
      - name: Build and push vmagent AMD64
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./victoriametrics/vmagent.dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: registry.cn-qingdao.aliyuncs.com/wod/victoriametrics:vmagent-${{ env.BUILD_VERSION }}-amd64
          build-args: BASE=victoriametrics/vmagent:${{ env.BUILD_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push vmagent ARM64
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./victoriametrics/vmagent.dockerfile
          platforms: linux/arm64
          push: true
          provenance: false
          tags: registry.cn-qingdao.aliyuncs.com/wod/victoriametrics:vmagent-${{ env.BUILD_VERSION }}-arm64
          build-args: BASE=victoriametrics/vmagent:${{ env.BUILD_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ==================== 2. vminsert ====================
      - name: Build and push vminsert AMD64
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./victoriametrics/vminsert.dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: registry.cn-qingdao.aliyuncs.com/wod/victoriametrics:vminsert-${{ env.BUILD_VERSION }}-amd64
          build-args: BASE=victoriametrics/vminsert:${{ env.BUILD_VERSION }}-cluster
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push vminsert ARM64
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./victoriametrics/vminsert.dockerfile
          platforms: linux/arm64
          push: true
          provenance: false
          tags: registry.cn-qingdao.aliyuncs.com/wod/victoriametrics:vminsert-${{ env.BUILD_VERSION }}-arm64
          build-args: BASE=victoriametrics/vminsert:${{ env.BUILD_VERSION }}-cluster
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ==================== 3. vmselect ====================
      - name: Build and push vmselect AMD64
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./victoriametrics/vmselect.dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: registry.cn-qingdao.aliyuncs.com/wod/victoriametrics:vmselect-${{ env.BUILD_VERSION }}-amd64
          build-args: BASE=victoriametrics/vmselect:${{ env.BUILD_VERSION }}-cluster
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push vmselect ARM64
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./victoriametrics/vmselect.dockerfile
          platforms: linux/arm64
          push: true
          provenance: false
          tags: registry.cn-qingdao.aliyuncs.com/wod/victoriametrics:vmselect-${{ env.BUILD_VERSION }}-arm64
          build-args: BASE=victoriametrics/vmselect:${{ env.BUILD_VERSION }}-cluster
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ==================== 4. vmstorage ====================
      - name: Build and push vmstorage AMD64
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./victoriametrics/vmstorage.dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: registry.cn-qingdao.aliyuncs.com/wod/victoriametrics:vmstorage-${{ env.BUILD_VERSION }}-amd64
          build-args: BASE=victoriametrics/vmstorage:${{ env.BUILD_VERSION }}-cluster
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push vmstorage ARM64
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./victoriametrics/vmstorage.dockerfile
          platforms: linux/arm64
          push: true
          provenance: false
          tags: registry.cn-qingdao.aliyuncs.com/wod/victoriametrics:vmstorage-${{ env.BUILD_VERSION }}-arm64
          build-args: BASE=victoriametrics/vmstorage:${{ env.BUILD_VERSION }}-cluster
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pipeline Completed
        run: echo "VictoriaMetrics multi-arch images successfully built and pushed to Aliyun Registry!"
