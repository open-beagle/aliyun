name: rvc

on:
  push:
    branches:
      - rvc
  workflow_dispatch:

env:
  RVC_VERSION: "2.2.231006"
  IMAGE_NAME: registry.cn-qingdao.aliyuncs.com/wod/verdantflare-app

# RVC - Retrieval-based Voice Conversion WebUI
# Custom build with pinned torch ecosystem versions for ABI compatibility
# - CUDA / PyTorch GPU-accelerated voice conversion
# - Gradio web UI on port 7865
# - Model weights downloaded from Hugging Face on first run

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read

    steps:
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo docker image prune --all --force

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.cn-qingdao.aliyuncs.com
          username: ${{ secrets.REGISTRY_USER_ALIYUN }}
          password: ${{ secrets.REGISTRY_PASSWORD_ALIYUN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          sbom: false
          context: ./rvc
          file: ./rvc/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_NAME }}:rvc-${{ env.RVC_VERSION }}
          build-args: |
            RVC_VERSION=${{ env.RVC_VERSION }}

      - name: Image build success
        run: echo "verdantflare-app:rvc-${{ env.RVC_VERSION }} built and pushed successfully!"
