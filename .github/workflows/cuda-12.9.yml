name: CUDA-12.9

on:
  push:
    branches:
      - cuda-12.9
  workflow_dispatch:

env:
  SOURCE_IMAGE: docker.io/nvidia/cuda:12.9.1-cudnn-runtime-ubuntu24.04
  TARGET_IMAGE: registry.cn-qingdao.aliyuncs.com/wod/cuda:12.9.1-cudnn-runtime-ubuntu24.04

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read

    steps:
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo docker image prune --all --force

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.cn-qingdao.aliyuncs.com
          username: ${{ secrets.REGISTRY_USER_ALIYUN }}
          password: ${{ secrets.REGISTRY_PASSWORD_ALIYUN }}

      - name: Pull CUDA image
        run: docker pull ${{ env.SOURCE_IMAGE }}

      - name: Tag and push CUDA image
        run: |
          docker tag ${{ env.SOURCE_IMAGE }} ${{ env.TARGET_IMAGE }}
          docker push ${{ env.TARGET_IMAGE }}

      - name: Image sync success
        run: echo "${{ env.TARGET_IMAGE }} synced successfully!"
