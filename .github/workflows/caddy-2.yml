name: caddy-2

on:
  workflow_dispatch:
  push:
    branches:
      - caddy-2

env:
  BUILD_VERSION: 2.11.4
  TARGET_REGISTRY: registry.cn-qingdao.aliyuncs.com/wod/caddy

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Calculate release version
        id: version
        run: |
          MAJOR_VERSION=$(echo "${{ env.BUILD_VERSION }}" | cut -d. -f1)
          MINOR_VERSION=$(echo "${{ env.BUILD_VERSION }}" | cut -d. -f1,2)
          echo "major=$MAJOR_VERSION" >> $GITHUB_OUTPUT
          echo "minor=$MINOR_VERSION" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:master
            network=host

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.cn-qingdao.aliyuncs.com
          username: ${{ secrets.REGISTRY_USER_ALIYUN }}
          password: ${{ secrets.REGISTRY_PASSWORD_ALIYUN }}

      - name: Build and push multi-platform Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./caddy/dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ env.TARGET_REGISTRY }}:${{ env.BUILD_VERSION }}
            ${{ env.TARGET_REGISTRY }}:${{ steps.version.outputs.minor }}
            ${{ env.TARGET_REGISTRY }}:${{ steps.version.outputs.major }}
            ${{ env.TARGET_REGISTRY }}:${{ env.BUILD_VERSION }}-alpine
            ${{ env.TARGET_REGISTRY }}:${{ steps.version.outputs.minor }}-alpine
            ${{ env.TARGET_REGISTRY }}:${{ steps.version.outputs.major }}-alpine
          build-args: |
            BASE=caddy:${{ env.BUILD_VERSION }}-alpine
            AUTHOR=${{ github.repository_owner }}
            VERSION=${{ env.BUILD_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push AMD64 Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./caddy/dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ env.TARGET_REGISTRY }}:${{ env.BUILD_VERSION }}-amd64
            ${{ env.TARGET_REGISTRY }}:${{ env.BUILD_VERSION }}-alpine-amd64
          build-args: |
            BASE=caddy:${{ env.BUILD_VERSION }}-alpine
            AUTHOR=${{ github.repository_owner }}
            VERSION=${{ env.BUILD_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push ARM64 Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./caddy/dockerfile
          platforms: linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ env.TARGET_REGISTRY }}:${{ env.BUILD_VERSION }}-arm64
            ${{ env.TARGET_REGISTRY }}:${{ env.BUILD_VERSION }}-alpine-arm64
          build-args: |
            BASE=caddy:${{ env.BUILD_VERSION }}-alpine
            AUTHOR=${{ github.repository_owner }}
            VERSION=${{ env.BUILD_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image push success
        run: echo "Caddy images pushed successfully"
