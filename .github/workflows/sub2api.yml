name: sub2api

on:
  push:
    branches:
      - sub2api
  workflow_dispatch:

env:
  BUILD_VERSION: 0.1.164
  SOURCE_IMAGE: weishaw/sub2api
  TARGET_REGISTRY: registry.cn-qingdao.aliyuncs.com/wod/sub2api

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.cn-qingdao.aliyuncs.com
          username: ${{ secrets.REGISTRY_USER_ALIYUN }}
          password: ${{ secrets.REGISTRY_PASSWORD_ALIYUN }}

      - name: Build and push multi-platform Docker image
        uses: docker/build-push-action@v5
        with:
          provenance: false
          sbom: false
          context: .
          file: ./sub2api/dockerfile
          push: true
          tags: |
            ${{ env.TARGET_REGISTRY }}:${{ env.BUILD_VERSION }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            BASE=${{ env.SOURCE_IMAGE }}:${{ env.BUILD_VERSION }}
            AUTHOR=${{ github.repository_owner }}
            VERSION=${{ env.BUILD_VERSION }}

      - name: Build and push AMD64 image
        uses: docker/build-push-action@v5
        with:
          sbom: false
          context: .
          file: ./sub2api/dockerfile
          push: true
          provenance: false
          tags: |
            ${{ env.TARGET_REGISTRY }}:${{ env.BUILD_VERSION }}-amd64
          platforms: linux/amd64
          build-args: |
            BASE=${{ env.SOURCE_IMAGE }}:${{ env.BUILD_VERSION }}
            AUTHOR=${{ github.repository_owner }}
            VERSION=${{ env.BUILD_VERSION }}

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v5
        with:
          sbom: false
          context: .
          file: ./sub2api/dockerfile
          push: true
          provenance: false
          tags: |
            ${{ env.TARGET_REGISTRY }}:${{ env.BUILD_VERSION }}-arm64
          platforms: linux/arm64
          build-args: |
            BASE=${{ env.SOURCE_IMAGE }}:${{ env.BUILD_VERSION }}
            AUTHOR=${{ github.repository_owner }}
            VERSION=${{ env.BUILD_VERSION }}

      - name: Image build success
        run: echo "sub2api:${{ env.BUILD_VERSION }} built successfully!"

  deploy:
    name: Deploy API to Kubernetes
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure Kubernetes access
        env:
          KUBERNETES_SERVER: ${{ secrets.KUBERNETES_SERVER }}
          KUBERNETES_TOKEN: ${{ secrets.KUBERNETES_TOKEN }}
          KUBERNETES_CA: ${{ secrets.KUBERNETES_CA }}
        run: |
          set -eu
          test -n "$KUBERNETES_SERVER"
          test -n "$KUBERNETES_TOKEN"

          if [ -n "$KUBERNETES_CA" ]; then
            ca_file="$RUNNER_TEMP/kubernetes-ca.crt"
            printf '%s\n' "$KUBERNETES_CA" > "$ca_file"
            kubectl config set-cluster beagle-ide \
              --server="$KUBERNETES_SERVER" \
              --certificate-authority="$ca_file" \
              --embed-certs=true
          else
            kubectl config set-cluster beagle-ide \
              --server="$KUBERNETES_SERVER" \
              --insecure-skip-tls-verify=true
          fi

          kubectl config set-credentials github-actions --token="$KUBERNETES_TOKEN"
          kubectl config set-context beagle-ide \
            --cluster=beagle-ide \
            --user=github-actions \
            --namespace=beagle-ide
          kubectl config use-context beagle-ide

      - name: Update API deployment
        run: |
          image="${{ env.TARGET_REGISTRY }}:${{ env.BUILD_VERSION }}"
          kubectl set image deployment/sub2api sub2api="$image"
          kubectl rollout status deployment/sub2api --timeout=5m
          kubectl get deployment/sub2api -o jsonpath='{.spec.template.spec.containers[?(@.name=="sub2api")].image}{"\n"}'
