name: sub2api

on:
  push:
    branches:
      - sub2api
  workflow_dispatch:

env:
  BUILD_VERSION: 0.1.138
  SOURCE_IMAGE: weishaw/sub2api
  TARGET_REGISTRY: registry.cn-qingdao.aliyuncs.com/wod/sub2api

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.cn-qingdao.aliyuncs.com
          username: ${{ secrets.REGISTRY_USER_ALIYUN }}
          password: ${{ secrets.REGISTRY_PASSWORD_ALIYUN }}

      - name: Build and push multi-platform Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./sub2api/dockerfile
          push: true
          tags: |
            ${{ env.TARGET_REGISTRY }}:${{ env.BUILD_VERSION }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            BASE=${{ env.SOURCE_IMAGE }}:${{ env.BUILD_VERSION }}
            AUTHOR=${{ github.repository_owner }}
            VERSION=${{ env.BUILD_VERSION }}

      - name: Build and push AMD64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./sub2api/dockerfile
          push: true
          provenance: false
          tags: |
            ${{ env.TARGET_REGISTRY }}:${{ env.BUILD_VERSION }}-amd64
          platforms: linux/amd64
          build-args: |
            BASE=${{ env.SOURCE_IMAGE }}:${{ env.BUILD_VERSION }}
            AUTHOR=${{ github.repository_owner }}
            VERSION=${{ env.BUILD_VERSION }}

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./sub2api/dockerfile
          push: true
          provenance: false
          tags: |
            ${{ env.TARGET_REGISTRY }}:${{ env.BUILD_VERSION }}-arm64
          platforms: linux/arm64
          build-args: |
            BASE=${{ env.SOURCE_IMAGE }}:${{ env.BUILD_VERSION }}
            AUTHOR=${{ github.repository_owner }}
            VERSION=${{ env.BUILD_VERSION }}

      - name: Image build success
        run: echo "sub2api:${{ env.BUILD_VERSION }} built successfully!"
