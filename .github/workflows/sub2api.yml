name: sub2api

on:
  push:
    branches:
      - sub2api
  workflow_dispatch:

env:
  BUILD_VERSION: 0.1.125
  SOURCE_IMAGE: weishaw/sub2api:0.1.125
  TARGET_REGISTRY: registry.cn-qingdao.aliyuncs.com/wod/sub2api

jobs:
  sync-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v2
        with:
          registry: registry.cn-qingdao.aliyuncs.com
          username: ${{ secrets.REGISTRY_USER_ALIYUN }}
          password: ${{ secrets.REGISTRY_PASSWORD_ALIYUN }}

      - name: Pull, tag and push AMD64 image
        run: |
          docker pull --platform=linux/amd64 ${{ env.SOURCE_IMAGE }}
          docker tag ${{ env.SOURCE_IMAGE }} ${{ env.TARGET_REGISTRY }}:${{ env.BUILD_VERSION }}-amd64
          docker push ${{ env.TARGET_REGISTRY }}:${{ env.BUILD_VERSION }}-amd64

      - name: Pull, tag and push ARM64 image
        run: |
          docker pull --platform=linux/arm64 ${{ env.SOURCE_IMAGE }}
          docker tag ${{ env.SOURCE_IMAGE }} ${{ env.TARGET_REGISTRY }}:${{ env.BUILD_VERSION }}-arm64
          docker push ${{ env.TARGET_REGISTRY }}:${{ env.BUILD_VERSION }}-arm64

      - name: Create and push multi-platform manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ env.TARGET_REGISTRY }}:${{ env.BUILD_VERSION }} \
            ${{ env.TARGET_REGISTRY }}:${{ env.BUILD_VERSION }}-amd64 \
            ${{ env.TARGET_REGISTRY }}:${{ env.BUILD_VERSION }}-arm64

      - name: Image sync success
        run: echo "sub2api:${{ env.BUILD_VERSION }} synced successfully!"
